<!DOCTYPE html>
<html lang="en">

    .btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}

    .epa-box-number{position:absolute;top:0;left:0;background:#333;color:#fff;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

    .epa-form-input:focus{outline:none;border:1px solid #e94560;box-shadow:0 0 3px rgba(233,69,96,0.2)}

  </style>
</head>

          selected?React.createElement('span',{style:{color:'#60a5fa',fontWeight:600,alignSelf:'center',marginLeft:8}},'Selected: '+(FIELD_LABELS[selected]||selected)+' (use arrow keys)'):React.createElement('span',{style:{color:'#999',alignSelf:'center',marginLeft:8}},'Click a field to select it')
        ),
        groups.map(function(group){
          return React.createElement('div',{key:group.title,className:'card',style:{marginBottom:12,padding:16}},
            React.createElement('h4',{style:{marginBottom:12,borderBottom:'1px solid #eee',paddingBottom:8}},group.title),
            React.createElement('table',{style:{width:'100%',borderCollapse:'collapse'}},
              React.createElement('thead',null,
                React.createElement('tr',null,
                  React.createElement('th',{style:{textAlign:'left',padding:'4px 8px',width:'40%'}},'Field'),
                  React.createElement('th',{style:{textAlign:'center',padding:'4px 8px',width:'30%'}},'Up / Down'),
                  React.createElement('th',{style:{textAlign:'center',padding:'4px 8px',width:'30%'}},'Left / Right')
                )
              ),
              React.createElement('tbody',null,
                (function(){
                  var rows=[];
                  for(var fi=0;fi<group.fields.length;fi++){
                    (function(fk){
                      var pos=alignData[fk]||{row:1,col:1};
                      var isSelected=selected===fk;
                      rows.push(React.createElement('tr',{key:fk,onClick:function(){setSelected(fk)},style:{background:isSelected?'rgba(233,69,96,0.1)':'transparent',cursor:'pointer',borderBottom:'1px solid #f0f0f0'}},
                        React.createElement('td',{style:{padding:'6px 8px',fontSize:13,fontWeight:isSelected?700:400}},FIELD_LABELS[fk]||fk),
                        React.createElement('td',{style:{textAlign:'center',padding:'6px 4px'}},
                          React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:4}},
                            React.createElement('button',{onClick:function(e){e.stopPropagation();nudge(fk,'row',-1)},style:{width:26,height:26,cursor:'pointer',border:'1px solid #ccc',borderRadius:4,background:'#f8f8f8'}},String.fromCharCode(9650)),
                            React.createElement('input',{type:'number',value:pos.row,onClick:function(e){e.stopPropagation()},onChange:function(e){updateField(fk,'row',e.target.value)},style:{width:45,textAlign:'center',padding:'2px 4px',border:'1px solid #ccc',borderRadius:4}}),
                            React.createElement('button',{onClick:function(e){e.stopPropagation();nudge(fk,'row',1)},style:{width:26,height:26,cursor:'pointer',border:'1px solid #ccc',borderRadius:4,background:'#f8f8f8'}},String.fromCharCode(9660))
                          )
                        ),
                        React.createElement('td',{style:{textAlign:'center',padding:'6px 4px'}},
                          React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:4}},
                            React.createElement('button',{onClick:function(e){e.stopPropagation();nudge(fk,'col',-1)},style:{width:26,height:26,cursor:'pointer',border:'1px solid #ccc',borderRadius:4,background:'#f8f8f8'}},String.fromCharCode(9664)),
                            React.createElement('input',{type:'number',value:pos.col,onClick:function(e){e.stopPropagation()},onChange:function(e){updateField(fk,'col',e.target.value)},style:{width:45,textAlign:'center',padding:'2px 4px',border:'1px solid #ccc',borderRadius:4}}),
                            React.createElement('button',{onClick:function(e){e.stopPropagation();nudge(fk,'col',1)},style:{width:26,height:26,cursor:'pointer',border:'1px solid #ccc',borderRadius:4,background:'#f8f8f8'}},String.fromCharCode(9654))
                          )
                        )
                      ));
                    })(group.fields[fi]);
                  }
                  return rows;
                })()
              )
            )
          );
        })
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
